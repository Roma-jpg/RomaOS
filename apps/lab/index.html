<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0a0d0b" />
  <title>romeo558 - Physics Lab</title>

  <link rel="stylesheet" href="lab.css" />
</head>

<body>
  <header class="lab-header">
    <div class="lab-brand">
      <a class="lab-back" href="https://romeo558.ru/" data-i18n="back">← PORTFOLIO</a>
      <div class="lab-title">Romeo558's <span data-i18n="lab">HTML LAB</span></div>
    </div>
    <div class="lab-header-state" aria-live="polite">
      <span data-current-name>RUBBER PHYSICS</span>
      <span data-current-index>01 / 02</span>
    </div>
  </header>

  <main class="page">
    <div class="feed-shell">
      <div class="experiments" data-experiment-feed>
        <!-- Добавляй новые симуляции такими же section - навигация подхватит их автоматически. -->
        <section
          class="experiment is-active"
          data-title-key="rubber"
          data-title="RUBBER PHYSICS"
          aria-label="Experiment: rubber ball"
          aria-hidden="false"
        >
          <pocket-physics></pocket-physics>
        </section>

        <section
          class="experiment"
          data-title-key="portal"
          data-title="PORTAL PHYSICS"
          aria-label="Experiment: portals"
          aria-hidden="true"
          inert
        >
          <portal-physics></portal-physics>
        </section>
      </div>
    </div>
  </main>

  <aside class="feed-nav" aria-label="Experiment navigation">
    <button
      class="feed-arrow"
      type="button"
      data-feed-previous
      aria-label="Previous experiment"
      disabled
    >↑</button>

    <div class="feed-position" aria-hidden="true">
      <strong data-feed-current>01</strong>
      <span>/</span>
      <span data-feed-total>02</span>
    </div>

    <div class="feed-dots" data-feed-dots aria-label="Experiment list"></div>

    <button
      class="feed-arrow"
      type="button"
      data-feed-next
      aria-label="Next experiment"
    >↓</button>

    <div class="feed-key-hint" aria-hidden="true">↑ ↓</div>
  </aside>

  <div class="feed-announcer" data-feed-announcer aria-live="polite"></div>

  <script src="pocket-physics.js"></script>
  <script src="portal-physics.js"></script>
  <script src="lab-i18n.js"></script>
  <script src="lab-navigation.js"></script>
</body>
</html>
