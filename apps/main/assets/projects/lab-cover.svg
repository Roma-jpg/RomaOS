<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">Romeo558 HTML Lab</title>
  <description id="description">A dark technical canvas with a red ball moving through blue and orange portals.</description>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0b110e"/><stop offset="1" stop-color="#18211b"/></linearGradient>
    <radialGradient id="ball"><stop stop-color="#ff8a8a"/><stop offset=".62" stop-color="#e9343d"/><stop offset="1" stop-color="#7e151b"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g fill="none" stroke="#d9e4da" stroke-opacity=".12"><path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M0 600h1200"/><path d="M120 0v720M240 0v720M360 0v720M480 0v720M600 0v720M720 0v720M840 0v720M960 0v720M1080 0v720"/></g>
  <g fill="none" stroke-width="14" filter="url(#glow)"><path d="M210 170l150 230-150 230" stroke="#42a5ff"/><path d="M990 170L840 400l150 230" stroke="#ff9147"/></g>
  <path d="M360 400h480" stroke="#6cff83" stroke-width="2" stroke-dasharray="10 14" opacity=".7"/>
  <circle cx="600" cy="400" r="82" fill="url(#ball)"/>
  <g fill="#f4f8f3" font-family="monospace" font-size="28" letter-spacing="4"><text x="64" y="74">ROMEO558 / HTML LAB</text><text x="64" y="672" fill="#6cff83">RUBBER PHYSICS + PORTAL PHYSICS</text></g>
